# https://render.com — Blueprint: New → Blueprint → connect repo. Set GEMINI_API_KEY in the dashboard (secret).
#
# Repo layout: if Dockerfile is at the repo root (default for github.com/shahronit/LensLayer---Data-Analystics-Agent),
# do NOT set rootDir. Only use rootDir when the app is in a subfolder, e.g.:
#   rootDir: data-layer-agent
# Then dockerfilePath is relative to that folder (usually ./Dockerfile).
services:
  - type: web
    name: layerlens
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      # Optional: gemini-2.5-flash is cheaper/faster than default gemini-2.5-pro
      # - key: GEMINI_MODEL
      #   value: gemini-2.5-flash
